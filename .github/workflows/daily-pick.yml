name: 每日选股

on:
  schedule:
    - cron: "30 8 * * 1-5"
  workflow_dispatch:
    inputs:
      signal_date:
        description: '信号日 YYYYMMDD（留空 = 今天）。用于补跑历史某天的 daily-action-list + 回测。'
        required: false
        default: ''
        type: string

jobs:
  daily-pick:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      # GitHub 海外 Runner 连不上国内券商 Tdx 服务器，关闭直连避免 ~24s 试探浪费，
      # 走下方加固的 akshare 兜底。国内自托管 Runner 请覆盖为 "1" 或 "auto" 启用 Tdx 提速。
      TDX_ENABLED: "0"
    steps:
      - name: 计算信号日 $TODAY
        id: today
        run: |
          if [ -n "${{ github.event.inputs.signal_date }}" ]; then
            TODAY="${{ github.event.inputs.signal_date }}"
          else
            TODAY=$(date +%Y%m%d)
          fi
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          echo "[daily-pick] 信号日: $TODAY"
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip 缓存
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('Frequently-Used-Program/auto_notify_boll.py') }}
          restore-keys: pip-${{ runner.os }}-

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install --retries 3 akshare pandas requests baostock matplotlib cos-python-sdk-v5 supabase backtrader

      - name: 尝试安装 pytdx（国内自托管 Runner 可选；GitHub 海外 Runner 自动跳过）
        continue-on-error: true
        run: pip install "pypandoc<1.10" pytdx 2>/dev/null || pip install pytdx 2>/dev/null || true

      - name: 策略1 Boll 扫描
        id: boll
        continue-on-error: true
        timeout-minutes: 25
        env:
          KLINE_BACKEND: akshare
          ENABLE_VISUALIZATION: "0"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          TODAY=${{ steps.today.outputs.today }}
          python scripts/strategy_cache.py pull boll $TODAY && echo "skip=true" >> $GITHUB_OUTPUT && exit 0
          python -m smcore.strategies.boll $TODAY
          python scripts/strategy_cache.py push boll $TODAY

      - name: 策略2 题材热度
        id: theme
        continue-on-error: true
        timeout-minutes: 20
        env:
          KLINE_BACKEND: akshare
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          TODAY=${{ steps.today.outputs.today }}
          python scripts/strategy_cache.py pull theme $TODAY && echo "skip=true" >> $GITHUB_OUTPUT && exit 0
          # theme 内部 datetime.now() 硬编码，用 SIGNAL_DATE 包装脚本注入指定日期
          SIGNAL_DATE=$TODAY python scripts/run_strategy_for_date.py theme
          python scripts/strategy_cache.py push theme $TODAY

      - name: 策略3 CCTV 板块
        id: cctv
        continue-on-error: true
        timeout-minutes: 25
        env:
          KLINE_BACKEND: akshare
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          TODAY=${{ steps.today.outputs.today }}
          python scripts/strategy_cache.py pull cctv $TODAY && echo "skip=true" >> $GITHUB_OUTPUT && exit 0
          SIGNAL_DATE=$TODAY python scripts/run_strategy_for_date.py cctv
          python scripts/strategy_cache.py push cctv $TODAY

      - name: 策略4 相对强弱
        id: relativity
        continue-on-error: true
        timeout-minutes: 20
        env:
          KLINE_BACKEND: akshare
          RELATIVITY_MAX_WORKERS: "1"
          RELATIVITY_SLEEP_SECONDS: "0.3"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          TODAY=${{ steps.today.outputs.today }}
          python scripts/strategy_cache.py pull relativity $TODAY && echo "skip=true" >> $GITHUB_OUTPUT && exit 0
          # relativity --max-workers 1 仍可通过 env 注入信号日
          SIGNAL_DATE=$TODAY python scripts/run_strategy_for_date.py relativity
          python scripts/strategy_cache.py push relativity $TODAY

      - name: 策略5 动量/相对强度
        id: momentum
        continue-on-error: true
        timeout-minutes: 25
        env:
          KLINE_BACKEND: akshare
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          TODAY=${{ steps.today.outputs.today }}
          python scripts/strategy_cache.py pull momentum $TODAY && echo "skip=true" >> $GITHUB_OUTPUT && exit 0
          SIGNAL_DATE=$TODAY python scripts/run_strategy_for_date.py momentum
          python scripts/strategy_cache.py push momentum $TODAY

      - name: 生成操作清单 + 上传 COS
        env:
          KLINE_BACKEND: akshare
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          TODAY=${{ steps.today.outputs.today }}
          SIGNAL_DATE=$TODAY python -c "
          import os, sys; sys.path.insert(0, '.')
          from smcore.strategy import fuse_signals, save_action_list
          from smcore.storage import upload_file

          today = os.environ.get('SIGNAL_DATE') or __import__('datetime').date.today().strftime('%Y%m%d')
          df, report = fuse_signals(today, total_capital=100000, max_picks=15, fetch_levels=True)
          print(f'操作清单: {len(df)} 只候选 @ {today}')
          if not df.empty:
              path = save_action_list(df, today)
              print(f'已保存: {path}')
              remote = f'Daily-Action-List-{today}.csv'
              if upload_file(path, remote):
                  print(f'已上传 COS: {remote}')
              else:
                  print('COS 未配置或上传失败，操作清单仅存本地')
              print('--- 日报段落 ---')
              print(report)
          else:
              print('无候选，跳过上传')
          "

      - name: 上传结果产物
        uses: actions/upload-artifact@v4
        with:
          name: stock-results-${{ github.run_number }}
          path: |
            stock_data/Stock-Selection-Boll-*.csv
            stock_data/Stock-Selection-Relativity-*.csv
            stock_data/Stock-Selection-Ashare-Theme-Turnover-*.csv
            stock_data/CCTV-Sector-Stock-Pool-*.csv
            stock_data/Stock-Selection-Momentum-*.csv
            stock_data/Daily-Action-List-*.csv
            stock_data/backtest_status.txt
          retention-days: 30

      - name: 预热看板数据
        continue-on-error: true
        env:
          KLINE_BACKEND: akshare
        run: python scripts/prewarm_dashboard.py

      - name: 每日清单前向信号回测
        continue-on-error: true
        timeout-minutes: 55
        env:
          KLINE_BACKEND: akshare
          HOLD_DAYS: "10"
          LOOKBACK_DAYS: "14"          # 从30降到14：海外akshare慢，已完成的历史结果会自动跳过
          PREPULL_INTERVAL: "0.3"      # 串行预拉每只间隔0.3s，保护akshare接口不被打崩（不用多线程）
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python scripts/daily_backtest.py || true
          echo "=== 回测状态 ==="
          cat stock_data/backtest_status.txt 2>/dev/null || echo "无状态文件"

      # 前端由 Render 在部署时自行构建（见 render.yaml buildCommand），
      # 此处只负责生成/提交数据，不再构建前端或生成静态 JSON。

      - name: 提交缓存与数据到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # --ignore-missing: 某些目录可能因上游步骤失败而不存在（如 daily_cache / cache），
          # 不应导致整步 fatal exit 128。
          git add -f --ignore-missing stock_data/daily_cache/
          git add -f --ignore-missing stock_data/cache/
          git add -f --ignore-missing stock_data/k_data/
          git add -f --ignore-missing stock_data/Daily-Action-List-*.csv
          git add -f --ignore-missing stock_data/Multi-Backtest-*.csv
          git add -f --ignore-missing stock_data/backtest_status.txt
          # 兜底：即使上面全部 miss 也继续执行（空提交会被 diff --quiet 拦住）
          true
          if git diff --cached --quiet; then
            echo "无变更，跳过提交"
          else
            git commit -m "chore: 预热看板缓存 + 数据 $(date +%Y-%m-%d)"
            # 远程可能有新提交（如手动 push），先拉取 rebase 再推送
            git pull --rebase --autostash origin master || true
            git push
          fi

name: 每日选股

on:
  schedule:
    - cron: "30 13 * * 1-5"
  workflow_dispatch:

jobs:
  daily-pick:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip 缓存
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('Frequently-Used-Program/auto_notify_boll.py') }}
          restore-keys: pip-${{ runner.os }}-

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install akshare pandas requests baostock matplotlib cos-python-sdk-v5 supabase

      - name: 策略1 Boll 扫描
        id: boll
        continue-on-error: true
        timeout-minutes: 15
        env:
          KLINE_BACKEND: akshare
          ENABLE_VISUALIZATION: "0"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          TODAY=$(date +%Y%m%d)
          python scripts/strategy_cache.py pull boll $TODAY && echo "skip=true" >> $GITHUB_OUTPUT && exit 0
          python Frequently-Used-Program/Stock-Selection-Boll.py
          python scripts/strategy_cache.py push boll $TODAY

      - name: 策略2 题材热度
        id: theme
        continue-on-error: true
        timeout-minutes: 10
        env:
          KLINE_BACKEND: akshare
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          TODAY=$(date +%Y%m%d)
          python scripts/strategy_cache.py pull theme $TODAY && echo "skip=true" >> $GITHUB_OUTPUT && exit 0
          python Frequently-Used-Program/Stock-Selection-Ashare-Theme-Turnover.py
          python scripts/strategy_cache.py push theme $TODAY

      - name: 策略3 CCTV 板块
        id: cctv
        continue-on-error: true
        timeout-minutes: 10
        env:
          KLINE_BACKEND: akshare
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          TODAY=$(date +%Y%m%d)
          python scripts/strategy_cache.py pull cctv $TODAY && echo "skip=true" >> $GITHUB_OUTPUT && exit 0
          python Frequently-Used-Program/Stock-Selection-CCTV-Sectors.py
          python scripts/strategy_cache.py push cctv $TODAY

      - name: 策略4 相对强弱
        id: relativity
        continue-on-error: true
        timeout-minutes: 20
        env:
          KLINE_BACKEND: akshare
          RELATIVITY_MAX_WORKERS: "1"
          RELATIVITY_SLEEP_SECONDS: "0.3"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          TODAY=$(date +%Y%m%d)
          python scripts/strategy_cache.py pull relativity $TODAY && echo "skip=true" >> $GITHUB_OUTPUT && exit 0
          python Frequently-Used-Program/Stock-Selection-Relativity.py --max-workers 1
          python scripts/strategy_cache.py push relativity $TODAY

      - name: 生成操作清单 + 上传 COS
        env:
          KLINE_BACKEND: akshare
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from datetime import date
          from smcore.strategy import fuse_signals, save_action_list
          from smcore.storage import upload_file

          today = date.today().strftime('%Y%m%d')
          df, report = fuse_signals(today, total_capital=100000, max_picks=15, fetch_levels=True)
          print(f'操作清单: {len(df)} 只候选')
          if not df.empty:
              path = save_action_list(df, today)
              print(f'已保存: {path}')
              remote = f'Daily-Action-List-{today}.csv'
              if upload_file(path, remote):
                  print(f'已上传 COS: {remote}')
              else:
                  print('COS 未配置或上传失败，操作清单仅存本地')
              print('--- 日报段落 ---')
              print(report)
          else:
              print('无候选，跳过上传')
          "

      - name: 上传结果产物
        uses: actions/upload-artifact@v4
        with:
          name: stock-results-${{ github.run_number }}
          path: |
            stock_data/Stock-Selection-Boll-*.csv
            stock_data/Stock-Selection-Relativity-*.csv
            stock_data/Stock-Selection-Ashare-Theme-Turnover-*.csv
            stock_data/CCTV-Sector-Stock-Pool-*.csv
            stock_data/Daily-Action-List-*.csv
          retention-days: 30

      - name: 预热看板数据
        env:
          KLINE_BACKEND: akshare
        run: python scripts/prewarm_dashboard.py

      - name: 提交缓存到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f stock_data/daily_cache/
          git add -f stock_data/Daily-Action-List-*.csv
          if git diff --cached --quiet; then
            echo "无变更，跳过提交"
          else
            git commit -m "chore: 预热看板缓存 $(date +%Y-%m-%d)"
            git push
          fi
